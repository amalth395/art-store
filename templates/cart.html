<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a1f2c, #000000);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
}

.navbar h2 {
    color: #00c6ff;
}

.navbar a {
    color: #ccc;
    text-decoration: none;
    margin-left: 20px;
}

.navbar a:hover {
    color: #00c6ff;
}

/* CONTAINER */
.container {
    padding: 40px 80px;
}

/* TITLE */
h1 {
    font-size: 32px;
}

/* CART ITEM */
.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,25,40,0.6);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,150,255,0.2);
    transition: 0.3s;
}

.cart-item:hover {
    transform: scale(1.01);
}

/* LEFT SIDE */
.item-left {
    display: flex;
    align-items: center;
    gap: 20px;
}

.item-left img {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
}

/* TEXT */
.item-name {
    font-size: 18px;
}

.price {
    color: #00c6ff;
}

/* REMOVE BUTTON */
.remove-btn {
    background: #ff4d4d;
    border: none;
    padding: 8px 15px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.remove-btn:hover {
    background: #ff1a1a;
}

/* TOTAL BOX */
.total-box {
    margin-top: 40px;
    background: rgba(10,25,40,0.6);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,150,255,0.3);
}

/* CHECKOUT BUTTON */
.checkout-btn {
    margin-top: 15px;
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.checkout-btn:hover {
    opacity: 0.9;
}

.empty {
    margin-top: 40px;
    color: #bbb;
}

</style>
</head>

<body>

<div class="navbar">
    <h2>ArchivexStudio</h2>
    <div>
        <a href="/dashboard">Home</a>
        <a href="/cart">Cart</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <h1>🛒 Your Cart</h1>

{% if cart %}

    {% for item in cart %}
    <div class="cart-item">

        <div class="item-left">
            <img src="{{ url_for('static', filename=item.image) }}">

            <div>
                <div class="item-name">{{ item.name }}</div>
                <div class="price">₹{{ item.price }}</div>
            </div>
        </div>

        <!-- REMOVE BUTTON -->
        <a href="/remove/{{ item.name }}">
            <button class="remove-btn">Remove</button>
        </a>

    </div>
    {% endfor %}

    <!-- TOTAL -->
    <div class="total-box">
        <h2>Total: ₹{{ total }}</h2>

        <a href="/checkout">
            <button class="checkout-btn">Proceed to Checkout</button>
        </a>
    </div>

{% else %}

    <p class="empty">Your cart is empty 😳</p>

{% endif %}
