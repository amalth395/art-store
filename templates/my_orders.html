<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #02141f, #000000);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.navbar h2 {
    color: #00d4ff;
}

.navbar a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* TITLE */
h1 {
    text-align: center;
    margin-top: 30px;
}

/* ORDER CARD */
.order-container {
    max-width: 800px;
    margin: auto;
}

.order-card {
    background: #0a1a24;
    padding: 20px;
    border-radius: 15px;
    margin: 20px;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    transition: 0.3s;
}

.order-card:hover {
    transform: scale(1.02);
}

.status {
    margin-top: 10px;
    font-weight: bold;
}

/* STATUS COLORS */
.pending { color: orange; }
.shipped { color: #00d4ff; }
.delivered { color: lime; }

</style>
</head>

<body>

<div class="navbar">
    <h2>ArchivexStudio</h2>
    <div>
        <a href="/dashboard">Home</a>
        <a href="/cart">Cart</a>
    </div>
</div>

<h1>📦 My Orders</h1>

<div class="order-container">

{% for order in orders %}
<div class="order-card">
<p><b>Order ID:</b> {{ order[0] }}</p>
<p><b>Item:</b> {{ order[2] }}</p>

{% if order[7] == 'Pending' %}
<span style="color: orange;">🟡 Pending</span>
{% elif order[7] == 'Shipped' %}
<span style="color: cyan;">🔵 Shipped</span>
{% else %}
<span style="color: lime;">🟢 Delivered</span>
{% endif %}
    ">
        Status: {{ order[7] }}
    </p>

</div>
{% endfor %}

</div>

</body>
</html>
