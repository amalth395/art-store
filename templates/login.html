<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - ArchivexStudio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a0000, #000000);
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow: hidden;
}

/* 🍒 FLOATING CHERRIES */
.cherry span {
    position: absolute;
    font-size: 26px;
    animation: fall linear infinite;
    opacity: 0.9;
    filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.6));
}

.cherry span:nth-child(1) { left: 5%; animation-duration: 10s; }
.cherry span:nth-child(2) { left: 20%; animation-duration: 12s; }
.cherry span:nth-child(3) { left: 35%; animation-duration: 9s; }
.cherry span:nth-child(4) { left: 50%; animation-duration: 11s; }
.cherry span:nth-child(5) { left: 65%; animation-duration: 10s; }
.cherry span:nth-child(6) { left: 80%; animation-duration: 13s; }
.cherry span:nth-child(7) { left: 90%; animation-duration: 9s; }

@keyframes fall {
    0% { top: -10%; transform: translateX(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { top: 110%; transform: translateX(60px) rotate(360deg); opacity: 0; }
}

/* LOGIN BOX */
.login-box {
    position: relative;
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,0,0,0.2);
    text-align: center;
    width: 300px;
    z-index: 1;
}

/* SHINE */
.login-box::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shine 6s infinite;
}

@keyframes shine {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
}

/* TITLE */
h2 {
    margin-bottom: 20px;
    font-weight: 500;
}

/* INPUT */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #ff4d4d);
    color: white;
    cursor: pointer;
    width: 100%;
}

/* LINK */
a {
    display: block;
    margin-top: 10px;
    color: #bbb;
    text-decoration: none;
}
</style>

</head>

<body>

<!-- 🍒 FLOAT -->

<div class="cherry">
    <span>🍒</span>
    <span>🍒</span>
    <span>🍒</span>
    <span>🍒</span>
    <span>🍒</span>
    <span>🍒</span>
    <span>🍒</span>
</div>

<!-- LOGIN BOX -->

<div class="login-box">

```
<h2>Login</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

<a href="/signin">Don't have an account? Signup</a>
```

</div>

</body>
</html>
